version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8300:8300"
    environment:
      - INVENTORY_DB_NAME=inventory_db
      - INVENTORY_DB_USER=inventory_user
      - INVENTORY_DB_PASSWORD=inventory_password
      - INVENTORY_DB_HOST=db
      - INVENTORY_DB_PORT=5432
      - INVENTORY_SECRET_KEY=test-secret-key
      - INVENTORY_DEBUG=True
      - INVENTORY_ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,backend
      - INVENTORY_CORS_ALLOWED_ORIGINS=http://localhost:3000
      - INVENTORY_REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: python manage.py runserver 0.0.0.0:8300

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://backend:8300/api
      - VITE_MEDIA_BASE_URL=http://backend:8300/media
    depends_on:
      - backend