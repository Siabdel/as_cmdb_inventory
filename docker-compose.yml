## version: '3.9'

services:
  # Base de données PostgreSQL
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_password 
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Externe 5433 → interne 5432
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Redis pour Celery
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    restart: unless-stopped
    networks:
      - app-network

  # Backend Django
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8300:8300"
    env_file:
      - ./backend/.env.prod
    depends_on:
      db:
        condition: "service_healthy"
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - media_files:/app/media
      - static_files:/app/static
      - ./qr_codes:/app/media/qr_codes
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8300/api/v1/assets/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Worker Celery
  celery:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A inventory_project worker -l info
    environment:
      - DATABASE_URL=postgresql://inventory_user:inventory_password@db:5432/inventory_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=django-insecure-change-me-in-production
      - DEBUG=1
    depends_on:
      - db
      - redis
      - backend
    volumes:
      - ./backend:/app
      - media_files:/app/media
      - ./qr_codes:/app/media/qr_codes
    restart: unless-stopped
    networks:
      - app-network

  # Scheduler Celery Beat
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A inventory_project beat -l info
    environment:
      - DATABASE_URL=postgresql://inventory_user:inventory_password@db:5432/inventory_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=django-insecure-change-me-in-production
      - DEBUG=1
    depends_on:
      - db
      - redis
      - backend
    volumes:
      - ./backend:/app
      - media_files:/app/media
    restart: unless-stopped
    networks:
      - app-network

  # Frontend Vue.js
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://backend:8300/api
      - VITE_MEDIA_BASE_URL=http://backend:8300/media
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  media_files:
  static_files: