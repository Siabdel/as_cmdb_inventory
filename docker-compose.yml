## version: '3.9'

services:
  # Base de données PostgreSQL
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_password 
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Externe 5433 → interne 5432
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Redis pour Celery
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    restart: unless-stopped
    networks:
      - app-network

  # Backend Django
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    ports:
      - "8300:8300"
    environment:
      - DB_HOST=db
      - DOCKER_ENV=1  # Signal Docker
      - DEBUG=1
      - DATABASE_URL=postgresql://inventory_user:inventory_pass@db:5432/inventory_db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=django-insecure-dev-key-change-in-production
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,backend
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - QR_CODE_BASE_URL=http://localhost:8300/assets
    depends_on:
      db:
        condition: "service_healthy"


    volumes:
      - ./backend:/app
      - media_files:/app/media
      - static_files:/app/static
    restart: unless-stopped
    networks:
      - app-network

  # Worker Celery
  celery:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    command: celery -A inventory_project worker -l info
    environment:
      - DATABASE_URL=postgresql://inventory_user:inventory_pass@db:5432/inventory_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=django-insecure-dev-key-change-in-production
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - media_files:/app/media  # Nom générique
      - ./qr_codes:/app/media/qr_codes  # Bind mount local
    restart: unless-stopped
    networks:
      - app-network

  # Scheduler Celery Beat
  celery-beat:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    command: celery -A inventory_project beat -l info
    environment:
      - DATABASE_URL=postgresql://inventory_user:inventory_pass@db:5432/inventory_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=django-insecure-dev-key-change-in-production
      - DEBUG=1
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - app-network

  # Frontend Vue.js
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8300/api
      - VITE_MEDIA_BASE_URL=http://localhost:8300/media
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  media_files:
  static_files: